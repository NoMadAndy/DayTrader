# GPU overlay — adds NVIDIA device reservations for non-production use
# Production already includes GPU via docker-compose.prod.yml.
#
# Usage (dev with GPU):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Production (preferred — already includes GPU):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Requirements:
# - NVIDIA GPU with CUDA support
# - nvidia-container-toolkit installed

services:
  ml-service:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - USE_CUDA=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  rl-trading-service:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - USE_CUDA=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
