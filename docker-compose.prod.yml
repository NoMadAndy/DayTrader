# Production docker-compose configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This explicitly uses production Dockerfile and disables development overrides
#
# GPU auto-detected: NVIDIA device reservations are included.
# On systems without GPU, set USE_CUDA=false or remove the deploy.resources.reservations block.
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    environment:
      - APP_ENV=production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - ML_SERVICE_URL=http://ml-service:8000
      - RL_SERVICE_URL=http://rl-trading-service:8001

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${ML_SERVICE_CPUS:-2.0}'
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - USE_CUDA=${USE_CUDA:-auto}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-2}
      - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-2}

  rl-trading-service:
    build:
      context: ./rl-trading-service
      dockerfile: Dockerfile
    ports:
      - "${RL_SERVICE_PORT:-8001}:8001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${RL_SERVICE_CPUS:-2.0}'
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - USE_CUDA=${USE_CUDA:-auto}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - BACKEND_URL=http://backend:3001
      - ML_SERVICE_URL=http://ml-service:8000
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-2}
      - TORCH_NUM_THREADS=${TORCH_NUM_THREADS:-2}
      - MAX_CONCURRENT_TRAININGS=${MAX_CONCURRENT_TRAININGS:-1}
